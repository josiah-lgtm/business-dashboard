name: business-dashboard

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      # double-$ so the var is expanded inside the container, not by compose.
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "127.0.0.1:${DB_PORT:-54329}:5432"

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public
      API_TOKEN: ${API_TOKEN}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      PORT: "3000"
      NODE_ENV: production
    healthcheck:
      # Node 22 has global fetch; no curl/wget needed in the slim image.
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    ports:
      - "127.0.0.1:${API_PORT:-54330}:3000"

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api/external/kv}
        VITE_WORKSPACE_KEY: ${VITE_WORKSPACE_KEY}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      # consumed by nginx envsubst at container start
      API_TOKEN: ${API_TOKEN}
      API_UPSTREAM: ${API_UPSTREAM:-http://api:3000}
    ports:
      - "127.0.0.1:${WEB_PORT:-54331}:80"

volumes:
  db_data:
