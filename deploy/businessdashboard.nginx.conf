# business-dashboard — static Vue SPA on businessdashboard.agencyadvanta.com
#
# Install on the server:
#   cp deploy/businessdashboard.nginx.conf /etc/nginx/sites-available/businessdashboard
#   ln -s /etc/nginx/sites-available/businessdashboard /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx
#   certbot --nginx -d businessdashboard.agencyadvanta.com   # adds the TLS + HTTP→HTTPS redirect

server {
    listen 80;
    listen [::]:80;
    server_name businessdashboard.agencyadvanta.com;

    root /var/www/businessdashboard;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Hashed asset filenames change every build, so they're safe to cache forever.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Hash-routed SPA (/#/overview, /#/finance …) — the server only ever serves
    # index.html; the browser handles the route after the '#'. try_files keeps
    # refreshes/deep links working even for non-hash paths.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Optional: same-origin proxy for cloud sync (kills the CORS preflight) ──
    # Uncomment, reload, then set Settings → Cloud sync → URL to  /kv
    # NOTE: team-tracker still enforces its own Origin allow-list server-side,
    # so this domain must already be allow-listed there regardless (see SYNC_RECOVERY.md).
    # location /kv/ {
    #     proxy_pass https://tracker.agencyadvanta.com/api/external/kv/;
    #     proxy_ssl_server_name on;
    #     proxy_set_header Host tracker.agencyadvanta.com;
    # }
}
