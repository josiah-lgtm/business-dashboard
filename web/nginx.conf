# Serves the built SPA AND reverse-proxies /api/* to the Fastify api, injecting
# the bearer token server-side. Result: the browser calls same-origin
# /api/external/kv/<key> (no CORS) and the token never enters the JS bundle.
#
# This file is an nginx template: ${API_TOKEN} and ${API_UPSTREAM} are filled in
# at container start by the official image's envsubst step. NGINX_ENVSUBST_FILTER
# (set in the Dockerfile) restricts substitution to those two vars so nginx's own
# $host / $uri / $scheme survive.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Sync POST blobs can approach the api's 1 MB value limit; allow headroom.
    client_max_body_size 5m;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Hashed assets — cache forever.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Live-update stream (SSE). Must NOT be buffered and must stay open far longer
    # than a normal request. Matched by regex so it takes precedence over the
    # /api/ prefix below; $1 rebuilds the upstream path (no /api namespace).
    location ~ ^/api/(external/kv/[^/]+/events)$ {
        proxy_pass ${API_UPSTREAM}/$1$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization "Bearer ${API_TOKEN}";
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding off;
    }

    # Same-origin API proxy. /api/external/kv/<key> -> <upstream>/external/kv/<key>
    # (the trailing slash on proxy_pass strips the /api/ prefix). The api never
    # sees the /api namespace; nginx owns it.
    location /api/ {
        proxy_pass ${API_UPSTREAM}/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization "Bearer ${API_TOKEN}";
        proxy_read_timeout 30s;
    }

    # Hash-routed SPA — the server only ever serves index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
